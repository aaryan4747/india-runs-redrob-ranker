ai_usage_summary: |
  Used Claude for architecture discussion, code review, and debugging assistance.
  Used GitHub Copilot for autocomplete during development.
  No candidate data was fed to any LLM during ranking — the ranker is entirely
  rule-based with custom scoring algorithms. All ranking logic runs locally
  with zero API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-dimensional rule-based ranker with five scoring components:
  Role-Fit (30%), Skill Match (25%), Career Quality (15%), Behavioral Signals (20%),
  and Logistics (10%). Skill matching uses a curated taxonomy with alias resolution
  and proficiency/duration weighting. Honeypot detection via 9 heuristic checks
  for internally contradictory profiles. Anti-keyword-stuffing logic penalizes
  beginner-proficiency bulk skill listings. Behavioral signals weight recruiter
  response rate, platform recency, and GitHub activity heavily — per JD guidance
  that availability matters as much as on-paper fit. Career scoring penalizes
  pure-services backgrounds and rewards product-company ML experience.
  Reasoning is generated per-candidate referencing specific profile facts.
  Runtime: ~45 seconds for 100K candidates on CPU.

